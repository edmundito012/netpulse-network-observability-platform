name: Docker Image

on:
  push:
    branches:
      - main

    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish backend image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t ghcr.io/edmundito012/netpulse-backend:latest ./backend

      - name: Push backend image
        run: docker push ghcr.io/edmundito012/netpulse-backend:latest
