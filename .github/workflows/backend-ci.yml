name: Backend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: netpulse_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d netpulse_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+psycopg2://admin:admin@localhost:5432/netpulse_test
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      MONITOR_INTERVAL_SECONDS: 30
      SNMP_INTERVAL_SECONDS: 60
      DASHBOARD_BROADCAST_INTERVAL_SECONDS: 5
      PING_TIMEOUT_SECONDS: 2
      SNMP_PORT: 1161
      SNMP_TIMEOUT_SECONDS: 2
      SNMP_RETRIES: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest